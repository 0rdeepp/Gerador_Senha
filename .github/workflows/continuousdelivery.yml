name: Continuous delivery

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main            # CD roda aqui
  pull_request:
    branches:
      - '*'             # CI roda em qualquer branch

jobs:
  deliver:
    name: Build e Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Verificar arquivos
        run: ls -R

      - name: Upload do artifact
        uses: actions/upload-artifact@v4
        with:
          name: Projeto_zipado
          path: |
            **/*.py
            README.md

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: deliver

    #  Só executa deploy na main (produção)
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download do artifact
        uses: actions/download-artifact@v4
        with:
          name: Projeto_zipado

      - name: Exibir arquivos
        run: ls -R

  buildx: # docker
    # needs: deploy só roda apenas quando completar o Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      # Add support for more platforms with QEMU (optional)
      # https://github.com/docker/setup-qemu-action
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      #-name: Login to Docker Hub
        #uses: docker/login-action@v4
        #with:
          #username: ${{ vars.DOCKERHUB_USERNAME }}
          #password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push # Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: user/app:latest

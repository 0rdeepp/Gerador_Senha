name: Discord
on:
  - push
jobs:
 discord_webhook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Discord Webhook
        uses: johnnyhuy/actions-discord-git-webhook@main
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          repo_name: repository_special_and_GenPass